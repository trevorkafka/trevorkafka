<script>
	// Light/dark toggle. The theme itself is applied earlier (script.js reads
	// localStorage; CSS handles the device default), so this only flips the
	// choice on click and keeps the icon in sync.
	(function setupThemeToggle() {
		var btn = document.getElementById('theme-toggle');
		if (!btn) return;
		var root = document.documentElement;
		var mq = window.matchMedia('(prefers-color-scheme: dark)');

		function effective() {
			var a = root.getAttribute('data-theme');
			if (a === 'dark' || a === 'light') return a;
			return mq.matches ? 'dark' : 'light';
		}
		function updateIcon() {
			var dark = effective() === 'dark';
			btn.innerHTML = dark
				? '<i class="fa-solid fa-sun"></i>'
				: '<i class="fa-solid fa-moon"></i>';
			var label = dark ? 'Switch to light mode' : 'Switch to dark mode';
			btn.setAttribute('aria-label', label);
			btn.setAttribute('title', label);
		}
		function toggle() {
			var next = effective() === 'dark' ? 'light' : 'dark';
			root.setAttribute('data-theme', next);
			try { localStorage.setItem('theme', next); } catch (e) {}
			updateIcon();
		}
		btn.addEventListener('click', toggle);
		btn.addEventListener('keydown', function (e) {
			if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
		});
		// Follow live OS changes only while the visitor hasn't chosen explicitly.
		mq.addEventListener('change', function () {
			if (!root.getAttribute('data-theme')) updateIcon();
		});
		updateIcon();
	})();
</script>
