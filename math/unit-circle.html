<style>

:root{
  --paper:#F5EEE2;
  --surface:#FCF8EF;
  --ink:#3C303E;
  --muted:#8a7a60;
  --line:#d9c9a6;
  --accent:#d46a53;
  --accent-h:#FB7F64;
  --chip:rgba(212,106,83,.14);
  --chip-line:rgba(212,106,83,.42);
  --tx:.2s;
  --accent3:#2b7a78;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:Arial,Helvetica,sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:clamp(18px,5vw,48px) 18px;
}
.wrap{width:100%;max-width:600px}

.title{
  font-family:'Freeman',Arial,sans-serif;
  font-size:300%;
  margin:50px 0 20px;
  color:var(--ink);
}

/* collapsible options panel */
.options{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:16px;
  position:relative;
}
.options > summary{
  list-style:none;cursor:pointer;
  display:flex;align-items:flex-start;gap:8px;
  padding:12px 18px;
  font-family:'Freeman',Arial,sans-serif;
  font-size:.95rem;color:var(--muted);line-height:1;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.options > summary::-webkit-details-marker{display:none}
.options > summary .arr{transition:transform .2s;font-size:.9rem;flex:none;line-height:1;margin-top:0.35em}
details.options[open] > summary .arr{transform:rotate(90deg)}
details.options[open] > summary{
  position:absolute;
  top:8px;left:18px;
  height:32px;
  padding:0;
}
.settings-sentence{
  font-family:'Freeman',Arial,sans-serif;
  font-size:.95rem;color:var(--muted);
  flex:1;line-height:1.6;
}
details.options[open] .settings-sentence{display:none}
.options-body{
  padding:8px 18px 8px;
  display:flex;flex-direction:column;gap:18px;
}
details.options[open] > .options-body{
  padding-left:30px;
}

.grp{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.grp > .lbl{
  font-family:'Freeman',Arial,sans-serif;
  font-size:.95rem;
  color:var(--muted);
  width:88px;
  flex:none;
  min-height:32px;
  display:flex;
  align-items:center;
}
.grp .opts{display:flex;flex-wrap:wrap;column-gap:8px;row-gap:4px;flex:1}
.func-break{flex-basis:100%;height:0}
@media(min-width:560px){.func-break{display:none}}
#funcOpts.inv .func-break{display:block}
.opt{
  position:relative;
  display:inline-flex;align-items:center;justify-content:center;
  min-height:32px;padding:5px 14px;border-radius:999px;
  cursor:pointer;font-size:.98rem;
  color:var(--muted);background:transparent;
  border:1.5px solid transparent;
  transition:background-color var(--tx) ease,color var(--tx) ease,border-color var(--tx) ease;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.opt:hover{color:var(--ink)}
.opt input{position:absolute;opacity:0;width:0;height:0;margin:0;pointer-events:none}
.opt:has(input:checked){
  background:var(--chip);
  border-color:var(--chip-line);
  color:var(--accent);
}
.opt:has(input:focus-visible){outline:2px solid var(--accent);outline-offset:2px}
.opts.slide{position:relative}
.opts.slide .pill{
  position:absolute;left:0;top:0;width:0;height:32px;
  background:var(--chip);border:1.5px solid var(--chip-line);
  border-radius:999px;z-index:0;pointer-events:none;opacity:0;
  transition:transform var(--tx) ease,width var(--tx) ease,height var(--tx) ease,opacity var(--tx) ease;
}
.opts.slide .opt{position:relative;z-index:1}
.opts.slide .opt:has(input:checked){background:transparent;border-color:transparent;color:var(--accent)}

/* stage */
.stage{
  display:flex;flex-direction:column;align-items:center;justify-content:center;

  text-align:center;
  padding:10px 8px;
  margin-top:1em;
  cursor:pointer;
  border-radius:12px;
  -webkit-tap-highlight-color:transparent;
}
.stage.inv{margin-top:clamp(7px,1.5vw,14px)}
#stage-hint{
  text-align:center;
  color:var(--muted);
  font-size:0.82rem;
  margin-top:2px;
  min-height:1.2em;
  transition:opacity 0.6s ease;
}
.hint-click{display:inline}
.hint-tap{display:none}
@media(max-width:899px){
  .hint-click{display:none}
  .hint-tap{display:inline}
}
#q{font-size:clamp(1.8rem,7vw,2.4rem);line-height:1.25;display:flex;align-items:center;width:100%;transition:opacity 0.15s ease}
#q:not(.inv) .mjx-container{margin:0}
#qlhs{flex:1;text-align:center}
#qeq{flex:none;padding:0 .2em}
#qans{flex:1;text-align:center;transition:opacity 0.15s ease}
#qans.reveal{color:var(--accent)}
.qhint{font-size:1rem;color:var(--muted)}
.circle{width:clamp(220px,72vw,320px)}
#uc{width:100%;height:auto;display:block;overflow:visible}
.uc-axis{stroke:var(--ink);stroke-width:1}
.uc-circle{fill:none;stroke:var(--ink);stroke-width:1.1}
.uc-ray{stroke:var(--accent);stroke-width:2.2;stroke-linecap:round}
.uc-arc{fill:none;stroke:var(--accent);stroke-width:2}
.uc-arrow2{fill:var(--accent)}
.uc-proj{stroke:var(--accent);stroke-width:1.2;stroke-dasharray:3 4;opacity:.5}
.uc-pt{fill:var(--accent)}
.uc-ref{fill:none;stroke:var(--accent3);stroke-width:2}
.uc-coord{color:var(--accent);display:flex;align-items:center;justify-content:center;width:100%;height:100%;line-height:1;white-space:nowrap;font-size:15px}
.uc-reflbl{color:var(--accent3);display:flex;align-items:center;justify-content:center;width:100%;height:100%;line-height:1;white-space:nowrap;font-size:15px}
.uc-ptlbl{color:var(--accent);display:flex;align-items:center;justify-content:center;width:100%;height:100%;line-height:1;white-space:nowrap;font-size:14px}
.uc-quadlbl{color:var(--ink);display:flex;align-items:center;justify-content:center;width:100%;height:100%;line-height:1;white-space:nowrap;font-size:11px;opacity:.55}
.uc-reftext{color:var(--accent3);display:flex;align-items:center;justify-content:center;width:100%;height:100%;line-height:1;white-space:nowrap;font-size:15px}
.uc-explain{color:var(--muted);display:flex;align-items:center;justify-content:center;width:100%;height:100%;line-height:1;white-space:nowrap;font-size:15px}
.explain{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;line-height:1.25;width:100%}
.explain:empty{display:none}
.explain .ex-coord{color:var(--accent);font-size:1rem}
.explain .ex-ref{color:var(--accent3);font-size:.95rem}
.explain .ex-def{color:var(--muted);font-size:.95rem}

/* preset buttons */
.preset-btn{
  border:1.5px solid var(--line);border-radius:999px;
  background:none;cursor:pointer;
  font-size:.9rem;padding:5px 14px;min-height:32px;
  color:var(--muted);font-family:'Freeman',Arial,sans-serif;
  transition:border-color var(--tx) ease,color var(--tx) ease;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.preset-btn:hover{color:var(--ink);border-color:var(--muted)}
.preset-btn:active{background:var(--chip);border-color:var(--chip-line);color:var(--accent)}
.preset-btn.active{background:var(--chip);border-color:var(--chip-line);color:var(--accent)}
.undo-preset{cursor:pointer;color:var(--muted);font-size:.85rem;padding:0 2px;align-self:center;user-select:none;-webkit-tap-highlight-color:transparent}
.undo-preset:hover{color:var(--ink)}


/* history */
details.hist{margin-top:26px;border-top:1px solid var(--line);padding-top:8px}
.hist summary{
  list-style:none;cursor:pointer;
  font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);display:flex;align-items:center;gap:8px;padding:8px 2px;
}
.hist summary::-webkit-details-marker{display:none}
.hist summary .arr{transition:transform .2s;font-size:.9rem}
details.hist[open] summary .arr{transform:rotate(90deg)}
#histList{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:8px 2px 4px}
.hrow{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:4px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:.95rem;color:var(--ink)}
@keyframes hrow-fadein{from{opacity:0}to{opacity:1}}
.hrow-new{animation:hrow-fadein 0.25s ease forwards}
.hempty{font-size:.85rem;color:var(--muted);font-style:italic;padding:6px 2px;text-align:center;width:100%}
</style>

<body>
<div class="wrap">
  <h1 class="title">Unit Circle Quiz</h1>

  <details class="options" id="settingsDetails">
    <summary>
      <span class="arr">›</span>
      <span id="settingsSentence" class="settings-sentence"></span>
    </summary>
    <div class="options-body">
      <div class="grp">
        <span class="lbl">Presets</span>
        <div class="opts">
          <button class="preset-btn" data-preset="easy">easy</button>
          <button class="preset-btn" data-preset="medium">medium</button>
          <button class="preset-btn" data-preset="hard">hard</button>

          <label class="opt"><input type="radio" name="units" value="deg" checked><span>\(\text{degrees}\)</span></label>
          <label class="opt"><input type="radio" name="units" value="rad"><span>\(\text{radians}\)</span></label>
        </div>
      </div>
      <div class="grp">
        <span class="lbl">Mode</span>
        <div class="opts slide" id="modeOpts">
          <span class="pill"></span>
          <label class="opt"><input type="radio" name="mode" value="trig" checked><span>\(\text{trig}\)</span></label>

          <label class="opt"><input type="checkbox" id="fSec"><span>\(\sec\)</span></label>
          <label class="opt"><input type="checkbox" id="fCsc"><span>\(\csc\)</span></label>
          <label class="opt"><input type="checkbox" id="fCot"><span>\(\cot\)</span></label>
        </div>
      </div>
      <div class="grp" id="domainGrp">
        <span class="lbl">Domain</span>

      </div>
      <div class="grp" id="invDomainGrp" style="display:none">
        <span class="lbl">Domain</span>
        <div class="opts slide" id="invDomainOpts">
          <span class="pill"></span>
          <label class="opt"><input type="radio" name="invdomain" value="nonneg" checked><span>\(\ge 0\)</span></label>
          <label class="opt"><input type="radio" name="invdomain" value="neg"><span>\(< 0\)</span></label>
          <label class="opt"><input type="radio" name="invdomain" value="all"><span>\(\text{all}\)</span></label>
        </div>
      </div>
      <div class="grp" id="notationGrp" style="display:none">
        <span class="lbl">Notation</span>
        <div class="opts slide" id="notationOpts">
          <span class="pill"></span>
          <label class="opt"><input type="radio" name="notation" value="pow" checked><span>\({}^{-1}\)</span></label>
          <label class="opt"><input type="radio" name="notation" value="arc"><span>\(\text{arc}\)</span></label>
        </div>
      </div>
      <div class="grp">
        <span class="lbl">Show</span>
        <div class="opts" id="addonOpts">
          <label class="opt"><input type="checkbox" id="aDiagram"><span>\(\text{unit circle}\)</span></label>
          <label class="opt"><input type="checkbox" id="aExplain"><span>\(\text{details}\)</span></label>
        </div>
      </div>
    </div>
  </details>

  <div class="stage">
    <div id="q"><span id="qlhs"></span><span id="qeq"></span><span id="qans"></span></div>
    <div class="circle" id="circleWrap"><svg id="uc" viewBox="0 0 300 285" aria-hidden="true"></svg></div>
    <div id="explain" class="explain"></div>
  </div>

  <div id="stage-hint"></div>

  <details class="hist">
    <summary><span class="arr">›</span> History <span id="histCount" style="margin-left:auto;font-variant-numeric:tabular-nums"></span></summary>
    <div id="histList"></div>
  </details>
</div>

<script>
/* ---------- exact value arithmetic: value = n*sqrt(r)/d ---------- */
const gcd=(a,b)=>{a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;};
function norm({n,r,d}){ if(n===0)return{n:0,r:1,d:1}; if(d<0){n=-n;d=-d;} const g=gcd(n,d); return{n:n/g,r,d:d/g}; }
function simpRoot(p){let f=1;for(let s=2;s*s<=p;s++){while(p%(s*s)===0){p/=s*s;f*=s;}}return{f,r:p};}
function mul(a,b){const s=simpRoot(a.r*b.r);return norm({n:a.n*b.n*s.f,r:s.r,d:a.d*b.d});}
function recip(a){ if(a.n===0)return null; return norm({n:a.d,r:a.r,d:a.n*a.r}); }
function divV(a,b){const rb=recip(b);return rb?mul(a,rb):null;}
function tex(v){
  if(v===null)return '\\text{undef.}';
  if(v.n===0)return '0';
  const sign=v.n<0?'-':'',an=Math.abs(v.n);
  let num=(v.r===1)?String(an):(an===1?'':String(an))+'\\sqrt{'+v.r+'}';
  return v.d===1 ? sign+num : sign+'\\dfrac{'+num+'}{'+v.d+'}';
}
const H={n:1,r:1,d:2},R2={n:1,r:2,d:2},R3={n:1,r:3,d:2},Z={n:0,r:1,d:1},ONE={n:1,r:1,d:1};
const neg=v=>({n:-v.n,r:v.r,d:v.d});
const SC={
  0:{sin:Z,cos:ONE}, 30:{sin:H,cos:R3}, 45:{sin:R2,cos:R2}, 60:{sin:R3,cos:H}, 90:{sin:ONE,cos:Z},
  120:{sin:R3,cos:neg(H)}, 135:{sin:R2,cos:neg(R2)}, 150:{sin:H,cos:neg(R3)}, 180:{sin:Z,cos:neg(ONE)},
  210:{sin:neg(H),cos:neg(R3)}, 225:{sin:neg(R2),cos:neg(R2)}, 240:{sin:neg(R3),cos:neg(H)}, 270:{sin:neg(ONE),cos:Z},
  300:{sin:neg(R3),cos:H}, 315:{sin:neg(R2),cos:R2}, 330:{sin:neg(H),cos:R3}
};
function val(func,deg){
  const sc=SC[((deg%360)+360)%360],s=sc.sin,c=sc.cos;
  return {sin:s,cos:c,tan:divV(s,c),sec:recip(c),csc:recip(s),cot:divV(c,s)}[func];
}
function degToRadTex(deg){
  let num=deg,den=180; const g=gcd(Math.abs(num),den); num/=g;den/=g;
  if(num===0)return '0';
  let sign=''; if(num<0){sign='-';num=-num;}
  const top=(num===1?'':num)+'\\pi';
  return den===1 ? sign+top : sign+'\\dfrac{'+top+'}{'+den+'}';
}

/* ---------- domains ---------- */
const ALL=[0,30,45,60,90,120,135,150,180,210,225,240,270,300,315,330];
const DOMAINS=[
  {id:'ref', text:'\\(30^\\circ\\), \\(45^\\circ\\), and \\(60^\\circ\\) only', textRad:'\\(\\tfrac{\\pi}{6}\\), \\(\\tfrac{\\pi}{4}\\), and \\(\\tfrac{\\pi}{3}\\) only', deg:'30^\\circ,\\ 45^\\circ,\\ 60^\\circ', rad:'\\tfrac{\\pi}{6},\\ \\tfrac{\\pi}{4},\\ \\tfrac{\\pi}{3}'},
  {id:'q1',  text:'the first quadrant',                  deg:'[\\,0^\\circ,\\,90^\\circ\\,]',       rad:'[\\,0,\\,\\tfrac{\\pi}{2}\\,]'},
  {id:'half',text:'the upper half-circle',               deg:'[\\,0^\\circ,\\,180^\\circ\\,]',      rad:'[\\,0,\\,\\pi\\,]'},
  {id:'full',text:'the full circle',                     deg:'[\\,0^\\circ,\\,360^\\circ)',          rad:'[\\,0,\\,2\\pi)'},
  {id:'neg', text:'\\(-360^\\circ\\) to \\(360^\\circ\\)', textRad:'\\(-2\\pi\\) to \\(2\\pi\\)', deg:'(-360^\\circ,\\,360^\\circ)', rad:'(-2\\pi,\\,2\\pi)'},
  {id:'any', text:'any angle',         deg:'\\text{any angle}',                   rad:'\\text{any angle}'}
];
function pool(id){
  if(id==='ref')return[30,45,60];
  if(id==='q1')return[0,30,45,60,90];
  if(id==='half')return[0,30,45,60,90,120,135,150,180];
  if(id==='full')return ALL.slice();
  if(id==='neg'){const p=ALL.slice();for(const a of ALL)if(a>0)p.push(a-360);return p;}
  const p=[];for(const a of ALL)for(let k=-2;k<=2;k++){const v=a+360*k;if(v>=-720&&v<=720)p.push(v);}return p;
}

/* ---------- inverse trig ---------- */
const INV_POOLS={
  sin:[-90,-60,-45,-30,0,30,45,60,90],
  cos:[0,30,45,60,90,120,135,150,180],
  tan:[-60,-45,-30,0,30,45,60],
  sec:[0,30,45,60,120,135,150,180],
  csc:[-90,-60,-45,-30,30,45,60,90],
  cot:[30,45,60,90,120,135,150]
};
const INV_CMD={
  arc:{sin:'\\arcsin',cos:'\\arccos',tan:'\\arctan',
       sec:'\\operatorname{arcsec}',csc:'\\operatorname{arccsc}',cot:'\\operatorname{arccot}'},
  pow:{sin:'\\sin^{-1}',cos:'\\cos^{-1}',tan:'\\tan^{-1}',
       sec:'\\sec^{-1}',csc:'\\csc^{-1}',cot:'\\cot^{-1}'}
};

/* ---------- state ---------- */
let questions=[],pos=-1,lastDeg=null,domainId='half',prevHistCount=0,units='deg',mode='trig',invNotation='pow',invDomain='nonneg',ready=false,hintClicks=0,presetSnapshot=null,suppressHideUndo=false;
const $=id=>document.getElementById(id);
const qlhs=$('qlhs'),qeq=$('qeq'),qans=$('qans'),uc=$('uc'),histList=$('histList'),histCount=$('histCount');
function ansSlot(){ const u=window.innerWidth>=480?'\\text{undefined}':'\\text{undef.}'; return'\\phantom{'+u+'}\\vphantom{\\left(\\dfrac{\\sqrt{2}}{2}\\right)}'; }

function activeFuncs(){
  const f=[];
  if($('fSin').checked)f.push('sin');
  if($('fCos').checked)f.push('cos');
  if($('fTan').checked)f.push('tan');
  if($('fSec').checked)f.push('sec');
  if($('fCsc').checked)f.push('csc');
  if($('fCot').checked)f.push('cot');
  return f;
}
const rnd=n=>Math.floor(Math.random()*n);
function makeQuestion(){
  const fs=activeFuncs();
  if(mode==='inv'){
    const allFs=fs;
    // Restrict the DOMAIN of the inverse function: filter on the sign of the
    // argument passed into it (= val(f,deg)), not the sign of the answer angle.
    const inDom=(f,d)=>{const v=val(f,d);return invDomain==='nonneg'?v.n>=0:v.n<0;};
    const validFs=invDomain==='all'?allFs:allFs.filter(f=>INV_POOLS[f].some(d=>inDom(f,d)));
    const func=validFs[rnd(validFs.length)];
    const rawPool=INV_POOLS[func];
    const p=invDomain==='all'?rawPool:rawPool.filter(d=>inDom(func,d));
    let deg,t=0; do{deg=p[rnd(p.length)];t++;}while(p.length>1&&deg===lastDeg&&t<25); lastDeg=deg;
    const cmd=INV_CMD[invNotation][func];
    const lhs=cmd+'\\!\\left('+tex(val(func,deg))+'\\right)';
    const ans=units==='rad'?degToRadTex(deg):deg+'^\\circ';
    return{lhs,ans,deg,func,revealed:false};
  }
  const func=fs[rnd(fs.length)];
  const p=pool(domainId);
  let deg,t=0; do{deg=p[rnd(p.length)];t++;}while(p.length>1&&deg===lastDeg&&t<25); lastDeg=deg;
  const ang=units==='rad'?degToRadTex(deg):deg+'^\\circ';
  return{lhs:'\\'+func+'\\!\\left('+ang+'\\right)',ans:tex(val(func,deg)),deg,func,revealed:false};
}
function pushNew(){
  questions.push(makeQuestion()); pos=questions.length-1;
}

/* ---------- unit circle diagram ---------- */
function texTfrac(v){
  if(v.n===0)return '0';
  const sg=v.n<0?'-':'',an=Math.abs(v.n);
  const num=v.r===1?String(an):(an===1?'':String(an))+'\\sqrt{'+v.r+'}';
  return v.d===1 ? sg+num : sg+'\\tfrac{'+num+'}{'+v.d+'}';
}
function preRatTeX(a,b){
  // (n_a√r_a/d_a)÷(n_b√r_b/d_b) — simplified but not yet rationalized
  if(a.n===0) return '0';
  const sign=((a.n<0)!==(b.n<0))?'-':'';
  const ni=Math.abs(a.n)*b.d, di=a.d*Math.abs(b.n), g=gcd(ni,di);
  const nI=ni/g, dI=di/g;
  const gr=gcd(a.r,b.r), rn=a.r/gr, rd=b.r/gr;
  const numTex=rn===1?String(nI):(nI===1?'':nI)+'\\sqrt{'+rn+'}';
  const denTex=rd===1?String(dI):(dI===1?'':dI)+'\\sqrt{'+rd+'}';
  if(denTex==='1') return sign+numTex;
  return sign+'\\tfrac{'+numTex+'}{'+denTex+'}';
}
function explanationTex(func){
  const pre='\\text{function definition: }';
  if(mode==='trig'){
    const t={sin:'\\sin\\theta=y',cos:'\\cos\\theta=x',tan:'\\tan\\theta=\\tfrac{y}{x}',
             sec:'\\sec\\theta=\\tfrac{1}{x}',csc:'\\csc\\theta=\\tfrac{1}{y}',cot:'\\cot\\theta=\\tfrac{x}{y}'};
    return pre+t[func];
  }
  const info={
    sin:{i:'y',             rd:'-90^\\circ\\le\\theta\\le90^\\circ',  rr:'-\\tfrac{\\pi}{2}\\le\\theta\\le\\tfrac{\\pi}{2}'},
    cos:{i:'x',             rd:'0^\\circ\\le\\theta\\le180^\\circ',   rr:'0\\le\\theta\\le\\pi'},
    tan:{i:'\\tfrac{y}{x}', rd:'-90^\\circ<\\theta<90^\\circ',       rr:'-\\tfrac{\\pi}{2}<\\theta<\\tfrac{\\pi}{2}'},
    sec:{i:'\\tfrac{1}{x}', rd:'0^\\circ\\le\\theta\\le180^\\circ',  rr:'0\\le\\theta\\le\\pi'},
    csc:{i:'\\tfrac{1}{y}', rd:'-90^\\circ\\le\\theta\\le90^\\circ', rr:'-\\tfrac{\\pi}{2}\\le\\theta\\le\\tfrac{\\pi}{2}'},
    cot:{i:'\\tfrac{x}{y}', rd:'0^\\circ<\\theta\\le180^\\circ',     rr:'0<\\theta\\le\\pi'}
  }[func];
  const cmd=INV_CMD[invNotation][func];
  return pre+cmd+'('+info.i+')=\\theta,\\;'+(units==='deg'?info.rd:info.rr);
}
function drawCircle(deg,revealed,func){
  const cx=150,cy=150,R=96,A0=30,A1=270,AR=26,SPIRAL=8;
  let s='<defs>'+
    '<marker id="sa" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" class="uc-arrow2"/></marker>'+
    '</defs>';
  s+='<line class="uc-axis" x1="'+A0+'" y1="'+cy+'" x2="'+A1+'" y2="'+cy+'"/>';
  s+='<line class="uc-axis" x1="'+cx+'" y1="'+A1+'" x2="'+cx+'" y2="'+A0+'"/>';
  s+='<circle class="uc-circle" cx="'+cx+'" cy="'+cy+'" r="'+R+'"/>';
  if(revealed){
    const base=((deg%360)+360)%360, rad=base*Math.PI/180;
    const px=cx+R*Math.cos(rad), py=cy-R*Math.sin(rad);
    const sc=SC[base];
    // Orange arc + angle label
    if(deg!==0){
      const totalRad=deg*Math.PI/180;
      const steps=Math.max(4,Math.round(Math.abs(deg)/4));
      const pts=[];
      for(let i=0;i<=steps;i++){
        const t=totalRad*i/steps;
        const r=AR+SPIRAL*Math.abs(t)/(2*Math.PI);

      }

    }
    // Teal reference angle arc + label
    const axisDir=(Math.cos(rad)>=0)?0:180;
    let d=base-axisDir; while(d>180)d-=360; while(d<=-180)d+=360;
    const refDeg=Math.abs(d);
    if(refDeg>0.5){
      const a0=axisDir*Math.PI/180, rs=Math.max(2,Math.round(refDeg/4)), rr=48, rp=[];
      for(let i=0;i<=rs;i++){const t=a0+(d*Math.PI/180)*i/rs; rp.push((cx+rr*Math.cos(t)).toFixed(1)+','+(cy-rr*Math.sin(t)).toFixed(1));}
      s+='<path class="uc-ref" d="M'+rp.join(' L')+'"/>';
      const mid=(axisDir+d/2)*Math.PI/180, rl=68, rlx=cx+rl*Math.cos(mid), rly=cy-rl*Math.sin(mid);

    }

    s+='<line class="uc-proj" x1="'+px.toFixed(1)+'" y1="'+py.toFixed(1)+'" x2="'+cx+'" y2="'+py.toFixed(1)+'"/>';
    s+='<line class="uc-ray" x1="'+cx+'" y1="'+cy+'" x2="'+px.toFixed(1)+'" y2="'+py.toFixed(1)+'"/>';
    s+='<circle class="uc-pt" cx="'+px.toFixed(1)+'" cy="'+py.toFixed(1)+'" r="4.5"/>';
    let ux=(px-cx)/R, uy=(py-cy)/R;
    const onAxis=base%90===0;
    if(onAxis){ const a=22*Math.PI/180,ca=Math.cos(a),sa=Math.sin(a); [ux,uy]=[ux*ca-uy*sa,ux*sa+uy*ca]; }
    const lpx=px+(onAxis?21:17)*ux, lpy=py+(onAxis?21:17)*uy;
  }
  uc.innerHTML=s;

}
/* bottom text block (coordinates, reference angle, relevant definition) — the "explanation" add-on */
function explainHTML(deg,func,blank){
  const base=((deg%360)+360)%360, sc=SC[base];
  const angTex=units==='rad'?degToRadTex(deg).replace(/dfrac/g,'tfrac'):deg+'^\\circ';
  const rad=base*Math.PI/180, axisDir=(Math.cos(rad)>=0)?0:180;
  let d=base-axisDir; while(d>180)d-=360; while(d<=-180)d+=360;
  const refDeg=Math.abs(d);
  const refTex=units==='rad'?degToRadTex(refDeg).replace(/dfrac/g,'tfrac'):refDeg+'^\\circ';
  // Worst-case strings — tallest possible content for each line
  const wcR='\\text{reference angle: }\\tfrac{5\\pi}{6}';
  const wcC='\\theta=\\tfrac{5\\pi}{6},\\;\\text{coordinates: }\\left(\\tfrac{\\sqrt{3}}{2},\\ \\tfrac{\\sqrt{3}}{2}\\right)';
  const wcD='\\text{function definition: }\\sin^{-1}(y)=\\theta,\\;{-}\\tfrac{\\pi}{2}\\le\\theta\\le\\tfrac{\\pi}{2}';
  const wcW='\\tan(\\tfrac{5\\pi}{6}) = \\dfrac{\\tfrac{1}{2}}{\\tfrac{\\sqrt{3}}{2}} = \\tfrac{1}{\\sqrt{3}} = \\tfrac{\\sqrt{3}}{3}';
  const vph=s=>'\\vphantom{'+s+'}';
  if(blank) return(
    '<div class="ex-ref">\\(\\phantom{'+wcR+'}\\)</div>'+
    '<div class="ex-coord">\\(\\phantom{'+wcC+'}\\)</div>'+
    '<div class="ex-def">\\(\\phantom{'+wcD+'}\\)</div>'+
    '<div class="ex-def">\\(\\phantom{'+wcW+'}\\)</div>'
  );
  const trigCmd={sin:'\\sin',cos:'\\cos',tan:'\\tan',sec:'\\sec',csc:'\\csc',cot:'\\cot'};
  let workTex;
  if(mode==='trig'){
    if(func==='sin'||func==='cos'){
      const coord=func==='sin'?sc.sin:sc.cos, letter=func==='sin'?'y':'x';
      workTex=trigCmd[func]+'('+angTex+') = '+letter+' = '+texTfrac(coord);
    } else {
      const specs={tan:[sc.sin,sc.cos],cot:[sc.cos,sc.sin],sec:[{n:1,r:1,d:1},sc.cos],csc:[{n:1,r:1,d:1},sc.sin]};
      const [numV,denV]=specs[func];
      const compound='\\dfrac{'+texTfrac(numV)+'}{'+texTfrac(denV)+'}';
      const gr=gcd(numV.r,denV.r),rd=denV.r/gr;
      workTex=trigCmd[func]+'('+angTex+') = '+compound+(rd>1?' = '+preRatTeX(numV,denV):'')+' = '+texTfrac(val(func,deg));
    }
  } else {
    const invInput={sin:sc.sin,cos:sc.cos,tan:val('tan',deg),sec:val('sec',deg),csc:val('csc',deg),cot:val('cot',deg)};
    const cmd=INV_CMD[invNotation][func];
    const inputTex=texTfrac(invInput[func]);
    let coordTex=null;
    if(func==='tan'||func==='cot'){
      const [numV,denV]=func==='tan'?[sc.sin,sc.cos]:[sc.cos,sc.sin];
      if(numV.n!==0) coordTex='\\dfrac{'+texTfrac(numV)+'}{'+texTfrac(denV)+'}';
    } else if(func==='sec'||func==='csc'){
      const coord=func==='sec'?sc.cos:sc.sin;
      if(coord.d>1||coord.r>1) coordTex='\\dfrac{1}{'+texTfrac(coord)+'}';
    }
    workTex=cmd+'\\!\\left('+inputTex+'\\right)'+(coordTex?' = '+cmd+'\\!\\left('+coordTex+'\\right)':'')+' = '+angTex;
  }
  return(
    '<div class="ex-ref">\\(\\text{reference angle: }'+refTex+vph(wcR)+'\\)</div>'+
    '<div class="ex-coord">\\(\\theta='+angTex+',\\;\\text{coordinates: }\\left('+texTfrac(sc.cos)+',\\ '+texTfrac(sc.sin)+'\\right)'+vph(wcC)+'\\)</div>'+
    '<div class="ex-def">\\('+(func?explanationTex(func)+vph(wcD):'\\phantom{'+wcD+'}')+'\\)</div>'+
    '<div class="ex-def">\\('+(func?workTex+vph(wcW):'\\phantom{'+wcW+'}')+'\\)</div>'
  );
}

  movePill($('domainOpts'),true); movePill($('unitOpts'),true);
  movePill($('modeOpts'),true); movePill($('notationOpts'),true); movePill($('invDomainOpts'),true);
});

/* init after MathJax loads */
(function wait(){
  if(window.MathJax&&MathJax.typesetPromise){
    ready=true;
    setMath(qeq,'\\(=\\)');
    relabelDomains();
    relabelFunctions();
    MathJax.typesetPromise([document.querySelector('.options')]).then(()=>{
      movePill($('domainOpts'),true); movePill($('unitOpts'),true); movePill($('modeOpts'),true);
    });
    updateSettingsUI();
    if(activeFuncs().length) pushNew();
    render();
  } else setTimeout(wait,60);
})();
</script>
